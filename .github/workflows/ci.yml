name: CI — Build & Release (Python Native)

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD — Kompilacja natywna (Linux & Windows)
  # ─────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            ext: ""
            asset_name: gitrm-linux-x64
          - os: windows-latest
            ext: ".exe"
            asset_name: gitrm-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Compile with Nuitka
        shell: bash
        run: |
          python -m nuitka --onefile --standalone --remove-output \
            --summary --show-modules --output-filename=gitrm${{ matrix.ext }} src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: gitrm${{ matrix.ext }}

  # ─────────────────────────────────────────────
  # 2. TEST — Smoke tests (Linux)
  # ─────────────────────────────────────────────
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: gitrm-linux-x64
          path: .
      
      - name: Setup binary
        run: chmod +x gitrm

      - name: Test — version command
        run: ./gitrm version | grep -q "git repo manager"

      - name: Test — config generation
        run: |
          ./gitrm config
          if [ ! -f gitrm.yaml ]; then
            echo "FAIL: gitrm.yaml not created"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 3. RELEASE — Automatyczny GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [ build, test ]
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate tag name
        id: version
        run: |
          # Jeśli push był z tagiem, użyj go. Jeśli nie, wygeneruj CalVer.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "gitrm ${{ steps.version.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## gitrm — Native Python Binary

            Automatyczny release skompilowany przy użyciu Nuitka.
            
            **Szybka instalacja (Linux):**
            ```bash
            chmod +x gitrm-linux-x64
            mkdir -p ~/.local/bin
            mv gitrm-linux-x64 ~/.local/bin/gitrm
            ```
          files: |
            release-assets/gitrm-linux-x64
            release-assets/gitrm-windows-x64.exe