name: CI — Build, Test & Release

on:
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0'
  PROJECT_FILE: 'bob.csproj'
  BINARY_NAME: 'bob'

jobs:
  # ─────────────────────────────────────────────
  # 1. RESTORE — pobierz i zweryfikuj dependencies
  # ─────────────────────────────────────────────
  restore:
    name: Restore dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_FILE }}

  # ─────────────────────────────────────────────
  # 2. BUILD — kompiluj dla x86_64 i arm64
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest
    needs: restore

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            label: x86_64
          - rid: linux-arm64
            label: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish ${{ env.PROJECT_FILE }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o dist/${{ matrix.rid }}

      # Zmień nazwę binary na bob-<arch> żeby artefakty się nie nadpisywały
      - name: Rename binary
        run: |
          mv dist/${{ matrix.rid }}/${{ env.BINARY_NAME }} \
             dist/${{ matrix.rid }}/${{ env.BINARY_NAME }}-${{ matrix.rid }}
          chmod +x dist/${{ matrix.rid }}/${{ env.BINARY_NAME }}-${{ matrix.rid }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.rid }}
          path: dist/${{ matrix.rid }}/${{ env.BINARY_NAME }}-${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. TEST — smoke testy na x64 binary
  # ─────────────────────────────────────────────
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_FILE }}

      # Testy uruchamiane przez dotnet run (nie wymaga gotowego binary)
      - name: Test — brak argumentów wyświetla help
        run: |
          OUTPUT=$(dotnet run --project ${{ env.PROJECT_FILE }} -- 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "usage: bob" \
            || (echo "FAIL: brak linii 'usage: bob' w helpie" && exit 1)

      - name: Test — komenda info zwraca wersję
        run: |
          OUTPUT=$(dotnet run --project ${{ env.PROJECT_FILE }} -- info 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "build orchestrator binary" \
            || (echo "FAIL: brak napisu 'build orchestrator binary' w info" && exit 1)

      - name: Test — nieznana komenda loguje błąd
        run: |
          OUTPUT=$(dotnet run --project ${{ env.PROJECT_FILE }} -- definitely-not-a-command 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "unknown command" \
            || (echo "FAIL: brak komunikatu 'unknown command'" && exit 1)

      - name: Test — config tworzy bob-config.json
        run: |
          cd /tmp
          dotnet run --project ${{ github.workspace }}/${{ env.PROJECT_FILE }} -- config
          [ -f bob-config.json ] \
            || (echo "FAIL: bob-config.json nie został stworzony" && exit 1)
          cat bob-config.json
          echo "OK: bob-config.json istnieje"

      - name: Test — fetch bez URL zwraca błąd
        run: |
          OUTPUT=$(dotnet run --project ${{ env.PROJECT_FILE }} -- fetch 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "url not specified" \
            || (echo "FAIL: brak komunikatu o braku URL" && exit 1)

  # ─────────────────────────────────────────────
  # 4. RELEASE — tag + GitHub Release z binary
  # ─────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [ build, test ]

    permissions:
      contents: write   # potrzebne do tworzenia tagów i releases

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # pełna historia potrzebna do git tag

      - name: Download artifact — linux-x64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-x64
          path: release-assets/

      - name: Download artifact — linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: release-assets/

      - name: Verify release assets
        run: ls -lah release-assets/

      - name: Generate tag name
        id: tag
        run: |
          # Format: v0.2-alpha.build.<numer runu>
          TAG="v0.2-alpha.build.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }} -m "CI release ${{ steps.tag.outputs.tag }}"
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "bob ${{ steps.tag.outputs.tag }}"
          body: |
            ## bob — build orchestrator binary

            Automatyczny release wygenerowany przez GitHub Actions z commitu `${{ github.sha }}`.

            ### Pobieranie
            | Architektura | Plik |
            |---|---|
            | Linux x86_64 | `bob-linux-x64` |
            | Linux ARM64  | `bob-linux-arm64` |

            ### Instalacja
            ```bash
            chmod +x bob-linux-x64
            sudo mv bob-linux-x64 /usr/local/bin/bob
            ```
          files: |
            release-assets/bob-linux-x64
            release-assets/bob-linux-arm64
          prerelease: true
          generate_release_notes: true